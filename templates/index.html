<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数学小勇士闯关乐园</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-bubbles"></div>
    <main class="container">
      <header class="hero card">
        <h1>🌈 数学小勇士闯关乐园</h1>
        <p>一起打败“马虎怪”，把薄弱知识点变成超能力！</p>
      </header>

      <section class="card">
        <h2>🧒 第一步：创建小勇士档案</h2>
        <div class="form-row">
          <input id="studentName" type="text" placeholder="请输入小朋友姓名" />
          <button id="createStudentBtn" class="btn-primary">创建档案</button>
        </div>
        <p id="studentInfo" class="tip">还没有创建档案哦～</p>
      </section>

      <section class="card">
        <h2>📝 第二步：开始诊断闯关</h2>
        <div class="form-row">
          <button id="generatePaperBtn" class="btn-primary">生成20题闯关卷</button>
          <button id="submitPaperBtn" class="btn-success" disabled>交卷看成绩</button>
        </div>
        <div id="paperWrap" class="paper-list"></div>
      </section>

      <section class="card">
        <h2>📊 学习雷达站</h2>
        <button id="refreshDashboardBtn" class="btn-secondary" disabled>刷新掌握情况</button>
        <div id="dashboardWrap" class="dashboard"></div>
      </section>

      <section class="card">
        <h2>🚀 薄弱点强化训练</h2>
        <button id="generateReinforceBtn" class="btn-warning" disabled>根据错题生成训练卷</button>
        <div id="reinforceWrap" class="paper-list"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
